<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gear Clock</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;500;700&display=swap');

:root {
  --bg:     #0f1011;
  --card:   #1a1b1c;
  --border: #2a2b2d;
  --text:   #e8eaed;
  --muted:  #5f6368;
  --blue:   #4285F4;
  --green:  #34A853;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Roboto', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  overflow-x: hidden;
}

header {
  width: 100%;
  padding: 14px 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  border-bottom: 1px solid var(--border);
  background: var(--bg);
  position: sticky;
  top: 0;
  z-index: 20;
}

.logo {
  font-size: 21px;
  font-weight: 700;
  letter-spacing: -0.5px;
  color: var(--text);
}

.tagline {
  font-size: 10px;
  color: var(--muted);
  letter-spacing: 2.5px;
  text-transform: uppercase;
}

.clock-wrap {
  width: 100%;
  max-width: 560px;
  padding: 24px 16px 12px;
}

.clock-row {
  display: flex;
  align-items: flex-end;
  justify-content: center;
  flex-wrap: wrap;
  gap: 2px;
  width: 100%;
  min-height: 70px;
}

.c-unit {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 5px;
  transition: opacity 0.6s, transform 0.6s;
}

.c-unit.hidden {
  opacity: 0;
  transform: scale(0.7);
  pointer-events: none;
  width: 0;
  padding: 0;
  overflow: hidden;
}

.c-val {
  font-family: 'Roboto Mono', monospace;
  font-weight: 700;
  font-size: clamp(26px, 7.5vw, 54px);
  line-height: 1;
  color: var(--text);
  min-width: 2ch;
  text-align: center;
  transition: color 0.12s;
}

.c-val.flash { color: var(--blue); }

.c-lbl {
  font-size: 7.5px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--muted);
  margin-top: 5px;
}

.c-sep {
  font-family: 'Roboto Mono', monospace;
  font-size: clamp(20px, 6vw, 46px);
  font-weight: 300;
  color: #333537;
  padding-bottom: 22px;
  user-select: none;
  transition: opacity 0.4s;
}

.c-sep.hidden {
  opacity: 0;
  width: 0;
  overflow: hidden;
  padding: 0;
}

.status {
  width: 100%;
  max-width: 560px;
  padding: 6px 16px 12px;
  display: flex;
  gap: 7px;
  flex-wrap: wrap;
  align-items: center;
}

.pill {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 11px;
  color: var(--muted);
  font-family: 'Roboto Mono', monospace;
  white-space: nowrap;
}

.pill em {
  color: var(--blue);
  font-style: normal;
  font-weight: 500;
}

.prog-wrap {
  flex: 1;
  min-width: 60px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  align-self: center;
  overflow: hidden;
}

.prog-bar {
  height: 100%;
  background: linear-gradient(90deg, var(--blue), var(--green));
  border-radius: 2px;
  width: 0%;
}

.start-zone {
  margin-bottom: 16px;
  transition: opacity 0.5s, max-height 0.6s;
  max-height: 70px;
  overflow: hidden;
}

.start-zone.gone {
  opacity: 0;
  max-height: 0;
  pointer-events: none;
}

.btn-start {
  padding: 13px 52px;
  border-radius: 30px;
  border: none;
  background: var(--blue);
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  font-family: 'Roboto', sans-serif;
  box-shadow: 0 3px 18px #4285F444;
  transition: transform 0.1s, background 0.2s;
}

.btn-start:active { transform: scale(0.95); }

.gear-grid {
  width: 100%;
  max-width: 560px;
  padding: 0 10px 50px;
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 6px;
}

.gc {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 8px 3px 6px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  position: relative;
}

.g-num {
  font-size: 7px;
  color: var(--muted);
  font-family: 'Roboto Mono', monospace;
  line-height: 1;
}

.g-svg-wrap {
  width: 38px;
  height: 38px;
}

.g-svg-wrap svg {
  width: 100%;
  height: 100%;
  display: block;
}

canvas#fireworks {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
  z-index: 999;
}
</style>
</head>
<body>

<canvas id="fireworks"></canvas>

<header>
  <div class="logo">Gear Clock</div>
  <span class="tagline">Time Engine</span>
</header>

<div class="clock-wrap">
  <div class="clock-row" id="clockRow"></div>
</div>

<div class="status">
  <div class="pill">G1 <em id="sG1">0.00</em></div>
  <div class="pill">G2 <em id="sG2">0.0000</em></div>
  <div class="prog-wrap"><div class="prog-bar" id="progBar"></div></div>
  <div class="pill"><em id="sElapsed">0</em>s</div>
</div>

<div class="start-zone" id="startZone">
  <button class="btn-start" id="btnStart">▶ Start</button>
</div>

<div class="gear-grid" id="gearGrid"></div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCtylJnBrTfAyrs8JUoc-L1sDXI5YsG20U",
  authDomain: "gear-clock-c8519.firebaseapp.com",
  projectId: "gear-clock-c8519",
  storageBucket: "gear-clock-c8519.firebasestorage.app",
  messagingSenderId: "583077431773",
  appId: "1:583077431773:web:7ba8dd1a1013cc7f520e34"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const ref = doc(db, 'clock', 'state');

const GEARS   = 100;
const G1_SECS = 1;
const RATIO   = 10;
const CA      = '#4285F4';
const CB      = '#34A853';

const CLOCK_UNITS = [
  { key:'mil', label:'Millennia', div:31536000000, mod:1e9, gear:9 },
  { key:'cen', label:'Centuries', div:3153600000,  mod:10,  gear:8 },
  { key:'dec', label:'Decades',   div:315360000,   mod:10,  gear:7 },
  { key:'yr',  label:'Years',     div:31536000,    mod:10,  gear:6 },
  { key:'mo',  label:'Months',    div:2628000,     mod:12,  gear:5 },
  { key:'wk',  label:'Weeks',     div:604800,      mod:52,  gear:4 },
  { key:'d',   label:'Days',      div:86400,       mod:7,   gear:3 },
  { key:'h',   label:'Hours',     div:3600,        mod:24,  gear:2 },
  { key:'m',   label:'Minutes',   div:60,          mod:60,  gear:1 },
  { key:'s',   label:'Seconds',   div:1,           mod:60,  gear:0 },
];

function makeSVG(i) {
  const color  = i % 2 === 0 ? CA : CB;
  const teeth  = 12;
  const cx = 19, cy = 19;
  const ro = 15, ri = 11, rh = 3.5;
  const whiteIdx = 0;

  let polygons = '';
  for (let t = 0; t < teeth; t++) {
    const a0 = (Math.PI * 2 / teeth) * t - Math.PI / 2;
    const a1 = a0 + (Math.PI / teeth) * 0.45;
    const a2 = a0 + (Math.PI / teeth) * 0.55;
    const a3 = a0 + (Math.PI * 2 / teeth);
    const pts = [
      [cx + ri * Math.cos(a0), cy + ri * Math.sin(a0)],
      [cx + ro * Math.cos(a1), cy + ro * Math.sin(a1)],
      [cx + ro * Math.cos(a2), cy + ro * Math.sin(a2)],
      [cx + ri * Math.cos(a3), cy + ri * Math.sin(a3)],
    ].map(p => p[0].toFixed(2) + ',' + p[1].toFixed(2)).join(' ');
    const fill = t === whiteIdx ? '#ffffff' : color;
    polygons += `<polygon points="${pts}" fill="${fill}"/>`;
  }

  let spokes = '';
  for (let s = 0; s < 4; s++) {
    const a  = (Math.PI / 2) * s;
    const x1 = (cx + rh * Math.cos(a)).toFixed(2);
    const y1 = (cy + rh * Math.sin(a)).toFixed(2);
    const x2 = (cx + (ri - 1) * Math.cos(a)).toFixed(2);
    const y2 = (cy + (ri - 1) * Math.sin(a)).toFixed(2);
    spokes += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${color}" stroke-width="2" stroke-linecap="round" opacity="0.4"/>`;
  }

  return `<svg viewBox="0 0 38 38" id="svg_${i}" xmlns="http://www.w3.org/2000/svg">
    <g id="rotor_${i}">
      ${polygons}
      <circle cx="${cx}" cy="${cy}" r="${ri - 0.5}" fill="#0f1011"/>
      ${spokes}
      <circle cx="${cx}" cy="${cy}" r="${rh}" fill="${color}" opacity="0.5"/>
    </g>
  </svg>`;
}

function buildClock() {
  const row = document.getElementById('clockRow');
  CLOCK_UNITS.forEach((u, i) => {
    if (i > 0) {
      const sep = document.createElement('div');
      sep.className = 'c-sep hidden';
      sep.id = 'sep_' + u.key;
      sep.textContent = ':';
      row.appendChild(sep);
    }
    const el = document.createElement('div');
    el.className = 'c-unit hidden';
    el.id = 'cu_' + u.key;
    el.innerHTML = `<div class="c-val" id="cv_${u.key}">00</div><div class="c-lbl">${u.label}</div>`;
    row.appendChild(el);
  });
}

function buildGrid() {
  const grid = document.getElementById('gearGrid');
  for (let i = 0; i < GEARS; i++) {
    const card = document.createElement('div');
    card.className = 'gc';
    card.id = `gc_${i}`;
    card.innerHTML = `<div class="g-num">#${i + 1}</div><div class="g-svg-wrap">${makeSVG(i)}</div>`;
    grid.appendChild(card);
  }
}

// ── FIREWORKS ──
const canvas = document.getElementById('fireworks');
const ctx    = canvas.getContext('2d');
let particles = [];

function resizeCanvas() {
  canvas.width  = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

function burst(x, y) {
  const colors = ['#4285F4','#EA4335','#FBBC05','#34A853','#ffffff','#ff6ec7'];
  for (let i = 0; i < 120; i++) {
    const angle  = Math.random() * Math.PI * 2;
    const speed  = 2 + Math.random() * 6;
    const color  = colors[Math.floor(Math.random() * colors.length)];
    const size   = 2 + Math.random() * 3;
    const type   = Math.random() < 0.4 ? 'star' : 'circle';
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      alpha: 1,
      color,
      size,
      type,
      gravity: 0.12,
      decay: 0.012 + Math.random() * 0.01
    });
  }
}

function triggerCelebration() {
  const cx = window.innerWidth / 2;
  const cy = window.innerHeight / 3;
  burst(cx, cy);
  setTimeout(() => burst(cx - 120, cy + 60), 180);
  setTimeout(() => burst(cx + 120, cy + 60), 320);
  setTimeout(() => burst(cx, cy + 20),        480);
}

function drawParticle(p) {
  ctx.save();
  ctx.globalAlpha = p.alpha;
  ctx.fillStyle   = p.color;
  if (p.type === 'star') {
    ctx.translate(p.x, p.y);
    ctx.beginPath();
    for (let s = 0; s < 5; s++) {
      const a = (s * 4 * Math.PI) / 5 - Math.PI / 2;
      s === 0 ? ctx.moveTo(Math.cos(a) * p.size, Math.sin(a) * p.size)
              : ctx.lineTo(Math.cos(a) * p.size, Math.sin(a) * p.size);
    }
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function animateParticles() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles = particles.filter(p => p.alpha > 0.01);
  for (const p of particles) {
    p.x     += p.vx;
    p.y     += p.vy;
    p.vy    += p.gravity;
    p.alpha -= p.decay;
    drawParticle(p);
  }
  requestAnimationFrame(animateParticles);
}
animateParticles();

// ── CLOCK & GEARS ──
let elapsed  = 0;
let lastTs   = null;
let rafId    = null;
let shown    = new Set();
let prevVals = {};
let prevRevFloor = new Array(GEARS).fill(0);

function gearRevs(i) {
  if (i >= 20) return 0;
  return elapsed / (G1_SECS * Math.pow(RATIO, i));
}

function tick() {
  CLOCK_UNITS.forEach((u) => {
    const revs = gearRevs(u.gear);
    if ((revs > 0.001 || u.gear === 0) && !shown.has(u.key)) {
      shown.add(u.key);
      document.getElementById('cu_' + u.key).classList.remove('hidden');
      const sep = document.getElementById('sep_' + u.key);
      if (sep) sep.classList.remove('hidden');
    }
    if (shown.has(u.key)) {
      const val = String(Math.floor(elapsed / u.div) % u.mod).padStart(2, '0');
      if (val !== prevVals[u.key]) {
        const el = document.getElementById('cv_' + u.key);
        if (el) {
          el.textContent = val;
          el.classList.add('flash');
          setTimeout(() => el.classList.remove('flash'), 150);
        }
        prevVals[u.key] = val;
      }
    }
  });

  for (let i = 0; i < GEARS; i++) {
    const revs  = gearRevs(i);
    const dir   = i % 2 === 0 ? 1 : -1;
    const deg   = dir * (revs * 360) % 360;
    const rotor = document.getElementById(`rotor_${i}`);
    if (rotor) rotor.setAttribute('transform', `rotate(${deg.toFixed(3)}, 19, 19)`);

    if (i >= 8) {
      const floor = Math.floor(revs);
      if (floor > prevRevFloor[i] && revs > 0) {
        prevRevFloor[i] = floor;
        triggerCelebration();
      }
    } else {
      prevRevFloor[i] = Math.floor(revs);
    }
  }

  document.getElementById('sG1').textContent  = gearRevs(0).toFixed(2);
  document.getElementById('sG2').textContent  = gearRevs(1).toFixed(4);
  document.getElementById('progBar').style.width = Math.min(100, gearRevs(1) * 100).toFixed(2) + '%';
  document.getElementById('sElapsed').textContent = Math.floor(elapsed);
}

function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = Math.min((ts - lastTs) / 1000, 0.05);
  lastTs   = ts;
  elapsed += dt;
  tick();
  rafId = requestAnimationFrame(loop);
}

function startFrom(startedAt) {
  elapsed = (Date.now() - startedAt) / 1000;
  shown.add('s');
  document.getElementById('cu_s').classList.remove('hidden');
  document.getElementById('startZone').classList.add('gone');
  for (let i = 0; i < GEARS; i++) prevRevFloor[i] = Math.floor(gearRevs(i));
  requestAnimationFrame(loop);
}

// ── FIREBASE INIT ──
async function init() {
  const snap = await getDoc(ref);
  if (snap.exists()) {
    startFrom(snap.data().startedAt);
  } else {
    document.getElementById('btnStart').addEventListener('click', async () => {
      const now = Date.now();
      try {
        await setDoc(ref, { startedAt: now });
        startFrom(now);
      } catch(e) {
        const snap2 = await getDoc(ref);
        if (snap2.exists()) startFrom(snap2.data().startedAt);
      }
    });
  }
}

buildClock();
buildGrid();
init();
</script>
</body>
</html>
